<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="irisGrad-icon" cx="50%" cy="45%" r="55%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#ffd280"/>
      <stop offset="35%" stop-color="#F7931A"/>
      <stop offset="70%" stop-color="#c2620a"/>
      <stop offset="100%" stop-color="#7c3d12"/>
    </radialGradient>
    <radialGradient id="shimmerGrad-icon" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffe4a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="foilGrad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#F7931A" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ffcf6e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c2620a" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="iconShadow-icon" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
    <filter id="eyeGlow-icon" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon background: rounded square -->
  <rect width="40" height="40" rx="10" ry="10" fill="#F7931A" filter="url(#iconShadow-icon)"/>

  <!-- Subtle inner gradient overlay -->
  <rect width="40" height="40" rx="10" ry="10" fill="url(#foilGrad-icon)"/>

  <!-- Eye -->
  <g filter="url(#eyeGlow-icon)">
    <path d="M8 20 Q14 11 20 11 Q26 11 32 20 Q26 29 20 29 Q14 29 8 20Z" fill="white" fill-opacity="0.95"/>
    <circle cx="20" cy="20" r="6.5" fill="url(#irisGrad-icon)"/>
    <circle cx="20" cy="20" r="3" fill="#1a0a00"/>
    <circle cx="20" cy="20" r="6.5" fill="url(#shimmerGrad-icon)"/>
    <ellipse cx="18.2" cy="17.8" rx="1.3" ry="1" fill="white" fill-opacity="0.9" transform="rotate(-10 18.2 17.8)"/>
    <ellipse cx="22" cy="21.5" rx="0.6" ry="0.45" fill="white" fill-opacity="0.5"/>
  </g>
</svg>
