<svg width="195" height="48" viewBox="0 0 195 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="irisGrad-auth" cx="50%" cy="45%" r="55%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#ffd280"/>
      <stop offset="35%" stop-color="#F7931A"/>
      <stop offset="70%" stop-color="#c2620a"/>
      <stop offset="100%" stop-color="#7c3d12"/>
    </radialGradient>
    <radialGradient id="shimmerGrad-auth" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffe4a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="foilGrad-auth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7e6" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#F7931A" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ffcf6e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c2620a" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="iconShadow-auth" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
    <filter id="eyeGlow-auth" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon background: rounded square (48x48, scaled 1.2x from 40x40) -->
  <rect width="48" height="48" rx="12" ry="12" fill="#F7931A" filter="url(#iconShadow-auth)"/>
  <rect width="48" height="48" rx="12" ry="12" fill="url(#foilGrad-auth)"/>

  <!-- Eye (all coords scaled 1.2x, centered at 24,24) -->
  <g filter="url(#eyeGlow-auth)">
    <path d="M9.6 24 Q16.8 13.2 24 13.2 Q31.2 13.2 38.4 24 Q31.2 34.8 24 34.8 Q16.8 34.8 9.6 24Z" fill="white" fill-opacity="0.95"/>
    <circle cx="24" cy="24" r="7.8" fill="url(#irisGrad-auth)"/>
    <circle cx="24" cy="24" r="3.6" fill="#1a0a00"/>
    <circle cx="24" cy="24" r="7.8" fill="url(#shimmerGrad-auth)"/>
    <ellipse cx="21.84" cy="21.36" rx="1.56" ry="1.2" fill="white" fill-opacity="0.9" transform="rotate(-10 21.84 21.36)"/>
    <ellipse cx="26.4" cy="25.8" rx="0.72" ry="0.54" fill="white" fill-opacity="0.5"/>
  </g>

  <!-- GL4NCE text (white for dark background) -->
  <text x="62" y="34" font-family="Outfit, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="29" fill="white">GL<tspan fill="#F7931A">4</tspan>NCE</text>
</svg>
